<div fxLayout="column">
  <div>
    <h1>Hero search</h1>
    <mat-divider></mat-divider>
  </div>
  <div fxLayout="column">
    <h3>Search</h3>
    <mat-form-field appearance="fill">
      <mat-label>Number</mat-label>
      <input
        type="text"
        placeholder="Pick one"
        aria-label="Number"
        matInput
        [(ngModel)]="term"
        [matAutocomplete]="auto"
        (input)="search()"
      />
      <mat-autocomplete
        autoActiveFirstOption
        #auto="matAutocomplete"
        (optionSelected)="optionSelected($event)"
      >
        <mat-option *ngFor="let heroe of heroes" [value]="heroe">
          {{ heroe.superhero }}
        </mat-option>

        <mat-option
          [value]=""
          *ngIf="heroes.length === 0 && term.trim().length > 0"
        >
          No hero was found with the term {{ term }}.
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
  <div>
    <pre>{{ heroeSelected | json }}</pre>
  </div>
  <div *ngIf="heroeSelected">
    <app-heroe-card [heroe]="heroeSelected"></app-heroe-card>
  </div>
</div>
